repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: uv run --group dev ruff format src tests
        language: system
        pass_filenames: false
      - id: ruff-check
        name: ruff-check
        entry: uv run --group dev ruff check src tests
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run --group dev pytest
        language: system
        pass_filenames: false
